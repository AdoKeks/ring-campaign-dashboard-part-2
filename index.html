<!DOCTYPE html>
<html lang="en">
<head>

<title>In The Ring x Kevin Hart — Campaign Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #5B21B6 0%, #4C1D95 100%);
  color: white; padding: 0 28px; display: flex;
  align-items: center; justify-content: space-between;
  height: 64px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-logo { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; }
.header-title { font-size: 17px; font-weight: 700; }
.header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }
.header-date { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; }

/* CAMPAIGN SUMMARY CARD */
.page { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

.campaign-card {
  background: white; border-radius: 16px; padding: 24px 28px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 20px;
}
.campaign-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.campaign-name { font-size: 22px; font-weight: 800; color: #1a1a2e; }
.campaign-meta { display: flex; gap: 28px; }
.campaign-meta-item { text-align: right; }
.campaign-meta-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 2px; }
.campaign-meta-value { font-size: 14px; font-weight: 700; color: #1a1a2e; }

.campaign-bottom { display: flex; align-items: flex-start; gap: 32px; }
.platforms-section { flex-shrink: 0; }
.platforms-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 10px; }
.platform-icons { display: flex; gap: 8px; }
.plat-badge { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.plat-ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.plat-yt { background: #3B82F6; }

.plat-tt { background: #22C55E; }

.top-performers { flex: 1; overflow: hidden; }
.performers-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 10px; }
.performers-shelf { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
.performers-shelf::-webkit-scrollbar { height: 4px; }
.performers-shelf::-webkit-scrollbar-track { background: #f0f2f5; border-radius: 2px; }
.performers-shelf::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 2px; }
.performer-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  background: #f8f9fa; border-radius: 10px; padding: 8px 12px;
  border: 1px solid #e8ecef;
}
.performer-rank { width: 20px; height: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: white; flex-shrink: 0; }
.rank-1 { background: #F59E0B; }
.rank-2 { background: #9CA3AF; }
.rank-3 { background: #C2855A; }
.rank-other { background: #4C1D95; }
.performer-info { display: flex; flex-direction: column; }
.performer-handle { font-size: 12px; font-weight: 700; color: #1a1a2e; }
.performer-views { font-size: 11px; color: #888; }
.performer-plat { width: 18px; height: 18px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* SUB-TABS */
.sub-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
.sub-tab {
  padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; background: white;
  color: #6D28D9; border: 2px solid #e8ecef; transition: all 0.15s;
}
.sub-tab.active { background: #6D28D9; color: white; border-color: #6D28D9; }
.sub-tab:hover:not(.active) { border-color: #6D28D9; }

/* TAB PANELS */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* STAT CARDS */
.stat-card { background: white; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 14px; }
.stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-icon svg { width: 16px; height: 16px; }
.stat-text { display: flex; flex-direction: column; }
.stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 2px; }
.stat-value { font-size: 20px; font-weight: 800; margin-bottom: 1px; }
.stat-sub { font-size: 11px; color: #aaa; }

/* CHARTS */
.chart-card { background: white; border-radius: 14px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.chart-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; color: #1a1a2e; }

/* SUMMARY LAYOUT */
.summary-layout { display: flex; gap: 20px; align-items: stretch; margin-bottom: 20px; }
.summary-stats-cluster { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; align-content: space-between; }
.stat-card-wide { grid-column: 1 / -1; }
.summary-donut-card { flex-shrink: 0; width: 500px; display: flex; flex-direction: column; }
.summary-donut-inner { display: flex; align-items: center; gap: 28px; flex: 1; }
.summary-donut-legend { display: flex; flex-direction: column; gap: 18px; flex: 1; }
.legend-item { display: flex; align-items: center; justify-content: space-between; }
.legend-left { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-right { display: flex; gap: 10px; align-items: baseline; }
.legend-val { font-size: 14px; font-weight: 700; }
.legend-pct { font-size: 12px; color: #999; }

/* SUMMARY TOP LIST */
.summary-list-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f5f6f8; }
.summary-list-row:last-child { border-bottom: none; }
.summary-list-rank { width: 24px; height: 24px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: white; flex-shrink: 0; }
.summary-list-info { flex: 1; min-width: 0; }
.summary-list-handle { font-size: 13px; font-weight: 700; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.summary-list-sub { font-size: 11px; color: #aaa; margin-top: 1px; }
.summary-list-views { font-size: 14px; font-weight: 800; color: #1a1a2e; text-align: right; flex-shrink: 0; }
.summary-list-plat { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ANALYTICS TAB */
.analytics-top { margin-bottom: 20px; }
.platform-table { width: 100%; border-collapse: collapse; }
.platform-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #aab; font-weight: 600; padding: 10px 18px; border-bottom: 1px solid #f0f2f5; text-align: left; }
.platform-table td { padding: 18px 18px; border-bottom: 1px solid #f5f6f8; font-size: 14px; font-weight: 500; }
.platform-table tr:last-child td { border-bottom: none; }
.platform-table tbody tr:hover td { background: #fafbfc; }
.plat-cell { display: flex; align-items: center; gap: 12px; }
.plat-icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.plat-name { font-weight: 600; font-size: 15px; color: #1a1a2e; }
.td-avg { color: #b0b8c9; font-weight: 500; }
.td-eng { color: #22C55E; font-weight: 700; }
.td-num { font-weight: 600; color: #1a1a2e; }

.analytics-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.eng-chart-wrap { height: 260px; }
.posts-dist-inner { display: flex; align-items: center; gap: 24px; }
.posts-dist-canvas { flex-shrink: 0; }
.posts-dist-legend { display: flex; flex-direction: column; gap: 12px; }
.dist-legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
.dist-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* TOP POSTS TAB */
.posts-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.post-card {
  background: white; border-radius: 14px; padding: 18px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: box-shadow 0.15s;
}
.post-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.post-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.post-rank-info { display: flex; align-items: center; gap: 8px; }
.post-rank { width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: white; flex-shrink: 0; }
.post-username { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
.post-plat { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.post-views { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
.post-views-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 14px; }
.post-stats { display: flex; gap: 14px; }
.post-stat { display: flex; flex-direction: column; }
.post-stat-val { font-size: 13px; font-weight: 700; }
.post-stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.3px; }
.post-link { display: block; margin-top: 14px; font-size: 11px; color: #6D28D9; text-decoration: none; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.post-link:hover { text-decoration: underline; }
.fraud-badge { font-size: 10px; background: #FEF3C7; color: #B45309; border-radius: 4px; padding: 2px 6px; font-weight: 600; display: inline-block; margin-top: 6px; }

/* TABLET */
@media (max-width: 1100px) {
  .posts-grid { grid-template-columns: repeat(3, 1fr); }
  .analytics-bottom { grid-template-columns: 1fr; }
  .summary-layout { flex-direction: column; }
  .summary-donut-card { width: 100%; }
  .summary-stats-cluster { grid-template-columns: 1fr 1fr; }
}

/* MOBILE */
@media (max-width: 768px) {
  .page { padding: 16px; }

  /* Header */
  .header { height: auto; padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  .header-title { font-size: 14px; }
  .header-sub { font-size: 11px; }
  .header-date { font-size: 11px; padding: 6px 10px; }

  /* Campaign card */
  .campaign-card { padding: 16px; }
  .campaign-name { font-size: 17px; }
  .campaign-bottom { flex-direction: column; gap: 16px; }

  /* Tabs */
  .sub-tabs { gap: 4px; }
  .sub-tab { padding: 7px 14px; font-size: 13px; }

  /* Summary */
  .summary-layout { flex-direction: column; gap: 16px; }
  .summary-stats-cluster { grid-template-columns: 1fr 1fr; align-content: start; }
  .summary-donut-card { width: 100%; }
  .summary-donut-inner { flex-direction: column; align-items: center; gap: 20px; }
  .summary-donut-legend { width: 100%; }

  /* Analytics */
  .analytics-top .platform-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .analytics-bottom { grid-template-columns: 1fr; }
  .posts-dist-inner { flex-direction: column; align-items: center; }
  .eng-chart-wrap { height: 200px; }

  /* Top posts */
  .posts-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .post-views { font-size: 18px; }

  /* Performers shelf */
  .campaign-top { flex-direction: column; gap: 8px; }
}
</style>
</head>

  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function platBgStyle(p) {
  if (p === 'instagram') return 'background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);';
  if (p === 'youtube') return 'background: #3B82F6;';
  return 'background: #22C55E;';

/* ---- TABS ---- */
const analyticsInited = { done: false };
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.sub-tab').forEach(b => {
    if (b.getAttribute('onclick').includes(id)) b.classList.add('active');
  });
  if (id === 'analytics' && !analyticsInited.done) {
    analyticsInited.done = true;
    initAnalyticsCharts();
  }
}

];
const tbody = document.getElementById('platformTableBody');
platforms.forEach(p => {
  const iconSvg = platIcon(p.key, 18);
  const iconStyle = p.key === 'instagram'
    ? 'background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);'

    <tr>

      <td class="td-eng">${p.eng}%</td>

});

new Chart(engCtx, {
  type: 'bar',

      data: platforms.map(p => parseFloat(p.eng)),
      backgroundColor: platforms.map(p => p.color + 'CC'),
      borderColor: platforms.map(p => p.color),
      borderWidth: 1,
      borderRadius: 6,
      barThickness: 60,

  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ' ' + ctx.raw + '%' } }

    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 13 }, color: '#666' } },

        grid: { color: '#f0f2f5' },

});
